services:
  # Servidor web Apache con PHP 8.2
  web:
    image: php:8.2-apache
    container_name: inventari-web
    ports:
      - "8080:80"
    volumes:
      - ./web:/var/www/html
    # Este comando instala los drivers necesarios para que PHP hable con MySQL
    command: >
      sh -c "docker-php-ext-install mysqli pdo pdo_mysql && apache2-foreground"
    depends_on:
      - db
    networks:
      - app-network

  # Servidor de base de datos MySQL
  db:
    image: mysql:8.0
    container_name: inventari-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: inventari
      MYSQL_USER: usuari
      MYSQL_PASSWORD: usuari1234
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - app-network

  # Adminer para gestionar la base de datos (Interfaz Web)
  adminer:
    image: adminer
    container_name: inventari-adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - db
    networks:
      - app-network

# Definición de volúmenes y redes globales
volumes:
  mysql-data:

networks:
  app-network:
    driver: bridge